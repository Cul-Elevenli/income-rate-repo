<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGX 航线船舶对比 — RACE 2616W vs BERLIN 2618W</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --border: #d0d5dd;
  --border-light: #e8eaed;
  --accent: #0f4c81;
  --accent-mid: #1a6bb5;
  --accent-light: #e8f1fb;
  --race: #e67e22;
  --race-bg: #fef3e8;
  --berlin: #2980b9;
  --berlin-bg: #e8f4fd;
  --positive: #0d6e3e;
  --positive-bg: #e6f4ed;
  --negative: #c0392b;
  --negative-bg: #fce8e6;
  --neutral: #5f6368;
  --neutral-bg: #f1f3f4;
  --text: #1a1a2e;
  --text2: #5f6368;
  --text3: #9aa0a6;
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); padding:0; -webkit-font-smoothing:antialiased; }
.container { max-width:1400px; margin:0 auto; padding:32px 40px; }

.header { display:flex; align-items:flex-end; justify-content:space-between; padding-bottom:20px; border-bottom:2px solid var(--accent); margin-bottom:28px; }
.header-left { display:flex; flex-direction:column; gap:4px; }
.header h1 { font-size:22px; font-weight:700; color:var(--accent); letter-spacing:-0.3px; }
.header-sub { font-size:12px; color:var(--text2); }
.header-right { text-align:right; font-size:12px; color:var(--text2); }

/* Legend */
.legend { display:flex; gap:24px; margin-bottom:24px; align-items:center; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; }
.legend-dot { width:12px; height:12px; border-radius:2px; }

/* Section */
.section { margin-bottom:32px; background:var(--surface); border:1px solid var(--border); }
.section-head { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#dbeafe; border-bottom:2px solid var(--accent); flex-wrap:wrap; gap:8px; }
.section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); }
.section-kpi { display:flex; gap:24px; padding:10px 20px; background:#fafbfc; border-bottom:1px solid var(--border-light); font-size:12px; color:var(--text2); flex-wrap:wrap; }
.section-kpi .item { display:flex; align-items:center; gap:6px; }
.section-kpi .val { font-weight:700; color:var(--text); font-size:13px; }

/* KPI Strip */
.kpi-strip { display:flex; border:1px solid var(--border); background:var(--surface); margin-bottom:32px; }
.kpi-cell { flex:1; padding:16px 20px; border-right:1px solid var(--border-light); }
.kpi-cell:last-child { border-right:none; }
.kpi-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; font-weight:600; margin-bottom:6px; }
.kpi-value { font-size:24px; font-weight:700; line-height:1; }
.kpi-sub { font-size:11px; color:var(--text2); margin-top:4px; }

/* Comparison KPI */
.kpi-pair { display:flex; align-items:baseline; gap:8px; margin-top:2px; }
.kpi-race { color: var(--race); font-weight:700; font-size:20px; }
.kpi-berlin { color: var(--berlin); font-weight:700; font-size:20px; }
.kpi-vs { font-size:11px; font-weight:600; padding:1px 5px; border-radius:3px; }
.kpi-vs.up { background:var(--positive-bg); color:var(--positive); }
.kpi-vs.down { background:var(--negative-bg); color:var(--negative); }

/* Table */
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th { background:#f8f9fa; font-weight:600; text-align:left; padding:8px 12px; border-bottom:2px solid var(--border); color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
tbody td { padding:8px 12px; border-bottom:1px solid var(--border-light); }
tbody tr:hover { background:#f8f9fb; }
tbody tr:last-child td { border-bottom:none; }

/* Dual bar */
.dual-bar { display:flex; align-items:center; gap:4px; height:20px; }
.bar-race { height:100%; background:var(--race); border-radius:2px 0 0 2px; min-width:2px; transition:width .3s; }
.bar-berlin { height:100%; background:var(--berlin); border-radius:0 2px 2px 0; min-width:2px; transition:width .3s; }
.bar-val { font-size:10px; font-weight:600; white-space:nowrap; }

/* Side by side cols */
.col-race { color: var(--race); font-weight:600; }
.col-berlin { color: var(--berlin); font-weight:600; }
.col-diff { font-weight:600; font-size:11px; }
.col-diff.up { color:var(--positive); }
.col-diff.down { color:var(--negative); }

/* FAK gauge */
.fak-gauge { display:inline-flex; align-items:center; gap:4px; }
.fak-pct { font-weight:700; font-size:12px; }
.fak-pct.green { color:var(--positive); }
.fak-pct.orange { color:#e67e22; }
.fak-pct.red { color:var(--negative); }

/* Footer */
.footer { text-align:center; font-size:10px; color:var(--text3); padding:20px 0; border-top:1px solid var(--border-light); margin-top:32px; }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-left">
    <h1>CGX 航线船舶对比</h1>
    <div class="header-sub">RACE 2616W vs BERLIN 2618W — 口岸TEU OFT&Revenue分析</div>
  </div>
  <div class="header-right">
    <div id="generated-time"></div>
    <div>中联航运 市场部 · MARKETING</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--race)"></div>RACE 2616W</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--berlin)"></div>BERLIN 2618W</div>
</div>

<!-- Section 1: Core KPI -->
<div id="kpi-strip" class="kpi-strip"></div>

<!-- Section 2: POL Comparison -->
<div class="section">
  <div class="section-head"><span class="section-title">口岸对比 — POL 综合指标</span></div>
  <div id="pol-kpi" class="section-kpi"></div>
  <div style="overflow-x:auto;">
    <table id="pol-table"><thead></thead><tbody></tbody></table>
  </div>
</div>

<!-- Section 3: POD Comparison -->
<div class="section">
  <div class="section-head"><span class="section-title">目的港对比 — POD 综合指标</span></div>
  <div id="pod-kpi" class="section-kpi"></div>
  <div style="overflow-x:auto;">
    <table id="pod-table"><thead></thead><tbody></tbody></table>
  </div>
</div>

<!-- Section 4: FAK vs OFT Comparison -->
<div class="section">
  <div class="section-head"><span class="section-title">FAK 占比对比 — 各口岸单海运费价格占 FAK 均值</span></div>
  <div style="display:flex;gap:12px;align-items:center;padding:8px 20px;background:#fafbfc;border-bottom:1px solid var(--border-light);font-size:12px;">
    <select id="fak-filter-pol" style="padding:3px 8px;border:1px solid var(--border);border-radius:3px;font-size:12px;" onchange="applyFakFilter()">
      <option value="">全部口岸</option>
    </select>
    <select id="fak-filter-pod" style="padding:3px 8px;border:1px solid var(--border);border-radius:3px;font-size:12px;" onchange="applyFakFilter()">
      <option value="">全部目的港</option>
    </select>
    <span id="fak-filter-info" style="color:var(--text3);font-size:11px;"></span>
    <button onclick="resetFakFilter()" style="margin-left:auto;padding:3px 10px;border:1px solid var(--border);border-radius:3px;background:var(--surface);cursor:pointer;font-size:11px;color:var(--text2);">重置</button>
  </div>
  <div id="fak-kpi" class="section-kpi"></div>
  <div style="overflow-x:auto;">
    <table id="fak-table"><thead></thead><tbody></tbody></table>
  </div>
</div>

<!-- Section 5: TEU Distribution -->
<div class="section">
  <div class="section-head"><span class="section-title">TEU 分布对比 — 各口岸箱量占比</span></div>
  <div style="overflow-x:auto; padding:16px 20px;">
    <div id="teu-bars"></div>
  </div>
</div>

</div>

<div class="footer">CGX 航线船舶对比 · 中联航运 市场部 · MARKETING · 仅供内部参考，不得外传</div>

<script>
// ── Data ──
// window.DATA will be injected here

// ── Helpers ──
const fmt = {
  num: v => v == null ? '—' : Number(v).toLocaleString('en-US', {maximumFractionDigits:0}),
  usd: v => v == null ? '—' : '$' + Number(v).toLocaleString('en-US', {maximumFractionDigits:0}),
  pct: v => v == null ? '—' : v.toFixed(1) + '%',
  dec: (v,d=1) => v == null ? '—' : Number(v).toFixed(d),
};

const POL_NAMES = {
  'CNTAO':'青岛','CNSHA':'上海','CNNGB':'宁波','CNSHK':'蛇口',
  'CNSWA':'汕头','CNXGG':'新港','CNXMN':'厦门','CNNAS':'南沙'
};

const POD_NAMES = {
  'AEJEA':'Jebel Ali','AEKLF':'Khalifa','OMSOH':'Sohar','AESCT':'Shahid Rajaee',
  'SADMM':'Dammam','SARUH':'Ruwais','SAJED':'Jeddah','SDPZU':'Port Sudan',
  'EGSOK':'Sokhna','YEADE':'Aden','DJJIB':'Djibouti','JOAQJ':'Aqaba',
  'INMUN':'Mundra','INNSA':'Nhava Sheva','INSSA':'Hazira','INDER':'Kandla',
  'PKKHI':'Karachi','MYPKG':'Port Klang'
};

function polName(c) { return POL_NAMES[c] || c; }
function podName(c) { return POD_NAMES[c] || c; }

// ── FAK 模块筛选器 ──
let fakFilter = { pol: '', pod: '' };

function initFakFilters() {
  const pols = new Set();
  const pods = new Set();
  (DATA.race.level3||[]).forEach(r => pols.add(r['POL Code']));
  (DATA.berlin.level3||[]).forEach(r => pols.add(r['POL Code']));
  (DATA.race.level2||[]).forEach(r => pods.add(r['DEL Code']));
  (DATA.berlin.level2||[]).forEach(r => pods.add(r['DEL Code']));
  
  const polSelect = document.getElementById('fak-filter-pol');
  [...pols].sort().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = polName(p);
    polSelect.appendChild(opt);
  });
  
  const podSelect = document.getElementById('fak-filter-pod');
  [...pods].sort().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = podName(p);
    podSelect.appendChild(opt);
  });
}

function applyFakFilter() {
  fakFilter.pol = document.getElementById('fak-filter-pol').value;
  fakFilter.pod = document.getElementById('fak-filter-pod').value;
  if (fakFilter.pol || fakFilter.pod) {
    const parts = [];
    if (fakFilter.pol) parts.push('POL: ' + polName(fakFilter.pol));
    if (fakFilter.pod) parts.push('POD: ' + podName(fakFilter.pod));
    document.getElementById('fak-filter-info').textContent = '已筛选: ' + parts.join(' + ');
  } else {
    document.getElementById('fak-filter-info').textContent = '';
  }
  renderFAK();
}

function resetFakFilter() {
  document.getElementById('fak-filter-pol').value = '';
  document.getElementById('fak-filter-pod').value = '';
  fakFilter = { pol: '', pod: '' };
  document.getElementById('fak-filter-info').textContent = '';
  renderFAK();
}

// Color for FAK %
function fakColor(pct) {
  if (pct >= 80) return 'green';
  if (pct >= 60) return 'orange';
  return 'red';
}

// ── Compute per-POL 单海运费价格/TEU for RACE (from level5, since RACE lacks avg_per_unit_oft) ──
function computeRaceOftPerTeu(data) {
  // RACE doesn't have Per_Unit_OFT in level5, use Revenue_Per_TEU as proxy
  // Actually, Revenue/TEU is different from 单海运费价格/TEU
  // For RACE, CM_Per_TEU is available and is the core metric
  // We'll compare: RACE CM/TEU vs BERLIN 单海运费价格/TEU (different metrics, clearly labeled)
  return null;
}

// ── Build unified POL data ──
function buildPolData() {
  const pols = new Set();
  const raceMap = {};
  const berlinMap = {};

  (DATA.race.level3||[]).forEach(r => {
    const pol = r['POL Code'];
    pols.add(pol);
    raceMap[pol] = r;
  });
  (DATA.berlin.level3||[]).forEach(r => {
    const pol = r['POL Code'];
    pols.add(pol);
    berlinMap[pol] = r;
  });

  // Compute FAK avg per POL for each vessel
  const raceFakByPol = buildFakByPol(DATA.race);
  const berlinFakByPol = buildFakByPol(DATA.berlin);

  const rows = [];
  // Sort by combined TEU descending
  const sorted = [...pols].sort((a,b) => {
    const ta = (raceMap[a]?.teu||0) + (berlinMap[b]?.teu||0);
    const tb = (raceMap[b]?.teu||0) + (berlinMap[b]?.teu||0);
    return tb - ta;
  });

  sorted.forEach(pol => {
    const r = raceMap[pol] || {};
    const b = berlinMap[pol] || {};
    const rTeu = r.teu || 0;
    const bTeu = b.teu || 0;
    const rRev = r.revenue || 0;
    const bRev = b.revenue || 0;
    // Both vessels: 单海运费价格/TEU (avg_per_unit_oft)
    const rOftPerTeu = r.avg_per_unit_oft || 0;
    const bOftPerTeu = b.avg_per_unit_oft || 0;
    // Both have Revenue/TEU
    const rRevPerTeu = r.revenue_per_teu || (rTeu > 0 ? rRev/rTeu : 0);
    const bRevPerTeu = b.revenue_per_teu || (bTeu > 0 ? bRev/bTeu : 0);

    // FAK values per POL
    const rFak = raceFakByPol[pol] || 0;
    const bFak = berlinFakByPol[pol] || 0;
    // FAK % — use 单海运费价格/TEU vs FAK (same metric for both)
    const rFakPct = rFak > 0 && rOftPerTeu > 0 ? (rOftPerTeu / rFak * 100) : null;
    const bFakPct = bFak > 0 && bOftPerTeu > 0 ? (bOftPerTeu / bFak * 100) : null;

    rows.push({
      pol, name: polName(pol),
      rTeu, bTeu,
      rRev, bRev,
      rRevPerTeu, bRevPerTeu,
      rOftPerTeu, bOftPerTeu,
      rFakPct, bFakPct,
    });
  });

  return rows.sort((a,b) => (b.rTeu+b.bTeu) - (a.rTeu+a.bTeu));
}

// Build FAK per POL (weighted avg of FAK by TEU split 20/40)
function buildFakByPol(vdata) {
  const fakMap = {};
  const fakList = vdata.fak_data || [];
  // Group by POL, compute weighted FAK
  const byPol = {};
  fakList.forEach(f => {
    const pol = f.POL;
    if (!byPol[pol]) byPol[pol] = [];
    byPol[pol].push(f);
  });

  Object.keys(byPol).forEach(pol => {
    let f20 = 0, f40 = 0;
    byPol[pol].forEach(f => {
      if (f.Size === '20' || f.Size === "20'") f20 = f.FAK || 0;
      if (f.Size === '40' || f.Size === "40'") f40 = f.FAK || 0;
    });
    // Approximate: average of 20' and 40'/2 FAK, weighted toward 40' (typical ~80% TEU is 40')
    // Simple: just average the FAK20 and FAK40 values available
    if (f20 && f40) {
      fakMap[pol] = (f20 + f40/2) / 1.5; // rough TEU-weighted
    } else if (f40) {
      fakMap[pol] = f40 / 2;
    } else if (f20) {
      fakMap[pol] = f20;
    }
  });
  return fakMap;
}

// ── Build POD data ──
function buildPodData() {
  const pods = new Set();
  const raceMap = {};
  const berlinMap = {};

  (DATA.race.level2||[]).forEach(r => {
    const pod = r['DEL Code'];
    pods.add(pod);
    raceMap[pod] = r;
  });
  (DATA.berlin.level2||[]).forEach(r => {
    const pod = r['DEL Code'];
    pods.add(pod);
    berlinMap[pod] = r;
  });

  const rows = [];
  [...pods].sort().forEach(pod => {
    const r = raceMap[pod] || {};
    const b = berlinMap[pod] || {};
    const rTeu = r.teu || 0;
    const bTeu = b.teu || 0;
    const rRev = r.revenue || 0;
    const bRev = b.revenue || 0;
    const rRevPerTeu = r.revenue_per_teu || (rTeu > 0 ? rRev/rTeu : 0);
    const bRevPerTeu = b.revenue_per_teu || (bTeu > 0 ? bRev/bTeu : 0);

    rows.push({
      pod, name: podName(pod),
      rTeu, bTeu,
      rRev, bRev,
      rRevPerTeu, bRevPerTeu,
    });
  });

  return rows.sort((a,b) => (b.rTeu+b.bTeu) - (a.rTeu+a.bTeu));
}

// ── Build FAK comparison data ──
function buildFakCompareData() {
  const raceFak = DATA.race.fak_data || [];
  const berlinFak = DATA.berlin.fak_data || [];

  // Normalize Size field: "20'" -> "20", "40'" -> "40"
  function normSize(s) { return String(s||'').replace(/'/g,'').replace(/GP/,'').replace(/HC/,'').replace(/HQ/,'').trim(); }

  // Build map: POL-POD-Size -> {race, berlin}
  const map = {};
  raceFak.forEach(f => {
    const key = f.POL + '-' + f.POD + '-' + normSize(f.Size);
    if (!map[key]) map[key] = {};
    map[key].race = f;
  });
  berlinFak.forEach(f => {
    const key = f.POL + '-' + f.POD + '-' + normSize(f.Size);
    if (!map[key]) map[key] = {};
    map[key].berlin = f;
  });

  // Show all routes, highlight common ones
  const rows = [];
  Object.keys(map).sort().forEach(key => {
    const d = map[key];
    const parts = key.split('-');
    const pol = parts[0], pod = parts[1], size = parts[2];
    if (fakFilter.pol && pol !== fakFilter.pol) return;
    if (fakFilter.pod && pod !== fakFilter.pod) return;
    const isCommon = d.race && d.berlin;

    // Get OFT directly from fak_data (per-box price, not per-TEU)
    const rOft = d.race ? (d.race.OFT_Avg || 0) : 0;
    const bOft = d.berlin ? (d.berlin.OFT_Avg || 0) : 0;
    const rFak = d.race ? d.race.FAK : 0;
    const bFak = d.berlin ? d.berlin.FAK : 0;

    const rFakPct = rOft > 0 && rFak > 0 ? (rOft / rFak * 100) : null;
    const bFakPct = bOft > 0 && bFak > 0 ? (bOft / bFak * 100) : null;

    rows.push({
      key, pol, pod, size, isCommon,
      rFak, bFak,
      rOft, bOft,
      rFakPct, bFakPct,
    });
  });

  // Sort: common routes first, then by POL
  return rows.sort((a,b) => {
    if (a.isCommon !== b.isCommon) return a.isCommon ? -1 : 1;
    return a.key.localeCompare(b.key);
  });
}

// ── Render KPI Strip ──
function renderKPI() {
  const r = DATA.race.level1;
  const b = DATA.berlin.level1;

  const rTeu = r.total_teu;
  const bTeu = b.total_teu;
  const rRev = r.total_revenue;
  const bRev = b.total_revenue;

  // 单海运费价格/TEU — weighted average from level3
  const raceL3 = DATA.race.level3 || [];
  const berlinL3 = DATA.berlin.level3 || [];
  let rOftSum = 0, rOftTeu = 0, bOftSum = 0, bOftTeu = 0;
  raceL3.forEach(p => {
    if (p.avg_per_unit_oft && p.teu) { rOftSum += p.avg_per_unit_oft * p.teu; rOftTeu += p.teu; }
  });
  berlinL3.forEach(p => {
    if (p.avg_per_unit_oft && p.teu) { bOftSum += p.avg_per_unit_oft * p.teu; bOftTeu += p.teu; }
  });
  const rOftPerTeu = rOftTeu > 0 ? rOftSum / rOftTeu : 0;
  const bOftPerTeu = bOftTeu > 0 ? bOftSum / bOftTeu : 0;

  const rRevPerTeu = rTeu > 0 ? rRev / rTeu : 0;
  const bRevPerTeu = b.revenue_per_teu || (bTeu > 0 ? bRev / bTeu : 0);

  function diffPct(a, bVal) {
    if (!bVal) return null;
    return ((a - bVal) / bVal * 100);
  }

  function diffTag(dp) {
    if (dp == null) return '';
    const cls = dp >= 0 ? 'up' : 'down';
    const sign = dp >= 0 ? '+' : '';
    return `<span class="kpi-vs ${cls}">${sign}${dp.toFixed(1)}%</span>`;
  }

  document.getElementById('kpi-strip').innerHTML = `
    <div class="kpi-cell">
      <div class="kpi-label">TEU</div>
      <div class="kpi-pair">
        <span class="kpi-race">${fmt.num(rTeu)}</span>
        <span style="color:var(--text3);font-size:12px">vs</span>
        <span class="kpi-berlin">${fmt.num(bTeu)}</span>
        ${diffTag(diffPct(bTeu, rTeu))}
      </div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-pair">
        <span class="kpi-race">${fmt.usd(rRev)}</span>
        <span style="color:var(--text3);font-size:12px">vs</span>
        <span class="kpi-berlin">${fmt.usd(bRev)}</span>
        ${diffTag(diffPct(bRev, rRev))}
      </div>
      <div class="kpi-sub">RACE / BERLIN</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-label">单海运费价格/TEU</div>
      <div class="kpi-pair">
        <span class="kpi-race">${fmt.dec(rOftPerTeu)}</span>
        <span style="color:var(--text3);font-size:12px">vs</span>
        <span class="kpi-berlin">${fmt.dec(bOftPerTeu)}</span>
        ${diffTag(diffPct(bOftPerTeu, rOftPerTeu))}
      </div>
      <div class="kpi-sub">PER_UNIT_OFT 加权均值</div>
    </div>
    <div class="kpi-cell">

// ── Render POL Table ──
function renderPOL() {
  const rows = buildPolData();
  const maxTeu = Math.max(...rows.map(r => Math.max(r.rTeu, r.bTeu)), 1);

  // KPI
  const totalRTeu = rows.reduce((s,r)=>s+r.rTeu,0);
  const totalBTeu = rows.reduce((s,r)=>s+r.bTeu,0);
  document.getElementById('pol-kpi').innerHTML = `
    <div class="item">RACE 合计 TEU: <span class="val">${fmt.num(totalRTeu)}</span></div>
    <div class="item">BERLIN 合计 TEU: <span class="val">${fmt.num(totalBTeu)}</span></div>
    <div class="item">共 <span class="val">${rows.length}</span> 个口岸</div>
  `;

  // Table
  document.querySelector('#pol-table thead').innerHTML = `<tr>
    <th>POL</th>
    <th>口岸</th>
    <th>RACE TEU</th>
    <th>BERLIN TEU</th>
    <th>TEU 对比</th>
    <th>RACE 单海运费价格/TEU</th>
    <th>BERLIN 单海运费价格/TEU</th>
    <th>差异</th>
    <th>RACE Rev/TEU</th>
    <th>BERLIN Rev/TEU</th>
    <th>FAK 占比 RACE</th>
    <th>FAK 占比 BERLIN</th>
  </tr>`;

  document.querySelector('#pol-table tbody').innerHTML = rows.map(r => {
    const rW = Math.round(r.rTeu / maxTeu * 100);
    const bW = Math.round(r.bTeu / maxTeu * 100);
    const oftDiff = r.rOftPerTeu > 0 && r.bOftPerTeu > 0 ? ((r.rOftPerTeu - r.bOftPerTeu) / r.bOftPerTeu * 100) : null;
    const oftDiffCls = oftDiff != null ? (oftDiff >= 0 ? 'up' : 'down') : '';
    const oftDiffSign = oftDiff != null ? (oftDiff >= 0 ? '+' : '') : '';

    return `<tr>
      <td style="font-weight:600;font-size:11px">${r.pol}</td>
      <td>${r.name}</td>
      <td class="col-race">${fmt.num(r.rTeu)}</td>
      <td class="col-berlin">${fmt.num(r.bTeu)}</td>

  }).join('');
}

// ── Render FAK comparison ──
function renderFAK() {
  const rows = buildFakCompareData();

  // KPI: avg FAK % for common routes
  let rFakPcts = [], bFakPcts = [];
  const commonRows = rows.filter(r => r.isCommon);
  commonRows.forEach(r => {
    if (r.rFakPct != null) rFakPcts.push(r.rFakPct);
    if (r.bFakPct != null) bFakPcts.push(r.bFakPct);
  });
  const avgRFak = rFakPcts.length ? rFakPcts.reduce((a,b)=>a+b,0)/rFakPcts.length : 0;
  const avgBFak = bFakPcts.length ? bFakPcts.reduce((a,b)=>a+b,0)/bFakPcts.length : 0;

  document.getElementById('fak-kpi').innerHTML = `
    <div class="item">总航线: <span class="val">${rows.length}</span> 条 (共同: <span class="val">${commonRows.length}</span>)</div>
    <div class="item">RACE 平均占FAK: <span class="val" style="color:${fakColor(avgRFak)}">${fmt.pct(avgRFak)}</span></div>
    <div class="item">BERLIN 平均占FAK: <span class="val" style="color:${fakColor(avgBFak)}">${fmt.pct(avgBFak)}</span></div>
  `;

  document.querySelector('#fak-table thead').innerHTML = `<tr>
    <th></th>
    <th>口岸</th>
    <th>目的港</th>
    <th>箱型</th>
    <th>FAK (RACE)</th>
    <th>FAK (BERLIN)</th>
    <th>RACE 单海运费价格</th>
    <th>BERLIN 单海运费价格</th>
    <th>RACE 占FAK</th>
    <th>BERLIN 占FAK</th>
  </tr>`;

  document.querySelector('#fak-table tbody').innerHTML = rows.map(r => {
    const badge = r.isCommon
      ? '<span style="background:#e8f1fb;color:var(--accent);font-size:9px;padding:1px 4px;border-radius:2px;font-weight:600">共同</span>'
      : '<span style="background:var(--neutral-bg);color:var(--neutral);font-size:9px;padding:1px 4px;border-radius:2px">独有</span>';
    return `<tr>
      <td>${badge}</td>
      <td>${polName(r.pol)}</td>
      <td>${podName(r.pod)}</td>
      <td>${r.size}'</td>

      <td>${r.rFakPct != null ? `<span class="fak-pct ${fakColor(r.rFakPct)}">${fmt.pct(r.rFakPct)}</span>` : '—'}</td>

    </tr>`;
  }).join('');
}
